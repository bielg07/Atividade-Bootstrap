<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
    crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerta e botoes</title>
</head>
<body>
    <div class="alert alert-success">Cadastro realizado com sucesso</div>
    <div class="alert alert-danger">Erro ao processar</div>
    <div class="alert alert-warning">Atenção: campo obrigatorio</div>
    <div class="alert alert-info">Dica: use letras maiusculas</div>

    <button class="btn btn-primary">Primario</button>
    <button class="btn btn-secondary">Secundario</button>
    <button class="btn btn-success">Sucesso</button>
    <button class="btn btn-danger">Perigo</button>
    <button class="btn btn-warning">Atenção</button>
    <button class="btn btn-info">Info</button>
    <button class="btn btn-outline-primary">Borda azul</button>
</body>
</html>
