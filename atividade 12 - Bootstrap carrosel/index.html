<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Primeira Página</title>
</head>
<body>
    <style>
        .custom-img
        {
            width: 540px;
            height: 540px;
            object-fit: cover;
        }
    </style>

    <div class="carousel slide" id="meuCarrossel" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#meuCarrossel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#meuCarrossel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#meuCarrossel" data-bs-slide-to="2"></button> 
        </div>

        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://i.pinimg.com/736x/51/92/98/5192983d9263eeb25574f00fdbf233de.jpg" class="d-block mx-auto custom-img" alt="Imagem 1">
                <div class="carousel-caption d-none d-md-block">
                    <h3>Neymar</h3>
                    <p>O principe da Baixada Santista</p>
                </div>
            </div>
            <div class="carousel-item">
                <img src="https://i.pinimg.com/736x/2b/ed/c9/2bedc9496d8fb450010a9bc8b6622428.jpg" class="d-block mx-auto custom-img" alt="Imagem 2">
                <div class="carousel-caption d-none d-md-block">
                    <h3>Cristiano Ronaldo</h3>
                    <p>O Rei de Portugual</p>
                </div>
            </div>
            <div class="carousel-item">
                <img src="https://static.gazetaesportiva.com/uploads/imagem/2018/11/16/messi2004-1024x576.jpg" class="d-block mx-auto custom-img" alt="Imagem 3">
                <div class="carousel-caption d-none d-md-block">
                    <h3>Lionel Messi</h3>
                    <p>O Surgimento do "E.T" de Catalunha</p>
                </div>
            </div>
        </div>

        <button class="carousel-control-prev" data-bs-target="#meuCarrossel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#meuCarrossel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#meuCarrossel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
